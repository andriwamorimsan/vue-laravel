<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Usuário</title>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 40px auto;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        .error { color: red; }
        .success { color: green; }
    </style>
</head>

<body>

<div id="app">

    <h1>Cadastrar Usuário</h1>

    <button @click="goBack">Voltar</button>

    <br><br>

    <input v-model="form.name" placeholder="Nome" />

    <input v-model="form.email" placeholder="Email" />

    <input v-model="form.cpf" placeholder="CPF" />

    <input v-model="form.password" type="password" placeholder="Senha" />

    <button @click="createUser">Salvar</button>

    <p v-if="error" class="error">{{ error }}</p>
    <p v-if="success" class="success">Usuário cadastrado com sucesso!</p>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const App = {
    data() {
        return {
            form: {
                name: '',
                email: '',
                cpf: '',
                password: ''
            },
            error: null,
            success: false
        }
    },

    methods: {

        async createUser() {
            this.error = null;
            this.success = false;

            try {
                await axios.post('http://127.0.0.1:8000/api/users', {
                    name: this.form.name,
                    email: this.form.email,
                    cpf: this.form.cpf,
                    password: this.form.password
                });

                this.success = true;

                this.form = {
                    name: '',
                    email: '',
                    cpf: '',
                    password: ''
                };

            } catch (err) {
                console.error(err);
                this.error = 'Erro ao cadastrar usuário';
            }
        },

        goBack() {
            window.location.href = "index.html";
        }
    }
};

Vue.createApp(App).mount('#app');
</script>

</body>
</html>
