<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuário</title>

    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 40px auto;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #f5f5f5;
        }

        .error { color: red; }
        .success { color: green; }
    </style>
</head>

<body>

<div id="app">

    <h1>Editar Usuário</h1>
    <button @click="goBack">Voltar</button>
    <br><br>
    <div v-if="loading">Carregando...</div>

    <div v-else>

        <input v-model="form.name" placeholder="Nome" />
        <input v-model="form.email" placeholder="Email" />
        <input v-model="form.cpf" placeholder="CPF" />
        <input v-model="form.password" type="password" placeholder="Nova senha (opcional)" />
        <button @click="updateUser">Atualizar Usuário</button>

        <p v-if="error" class="error">{{ error }}</p>
        <p v-if="success" class="success">Usuário atualizado!</p>

        <h2 style="margin-top:30px;">Produtos do Usuário</h2>

        <div v-if="products.length === 0">
            Nenhum produto encontrado.
        </div>

        <table v-else>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Descrição</th>
                </tr>
            </thead>

            <tbody>
                <tr v-for="p in products" :key="p.id">
                    <td>{{ p.id }}</td>
                    <td>{{ p.nome }}</td>
                    <td>{{ p.preco }}</td>
                    <td>{{ p.descricao }}</td>
                </tr>
            </tbody>
        </table>

    </div>

</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const App = {
    data() {
        return {
            userId: null,
            loading: false,
            error: null,
            success: false,

            form: {
                name: '',
                email: '',
                cpf: '',
                password: ''
            },

            products: [] 
        }
    },

    mounted() {
        const params = new URLSearchParams(window.location.search);
        this.userId = params.get('user_id');

        if (!this.userId) {
            this.error = 'ID não informado';
            return;
        }

        this.fetchUser();
        this.fetchProducts();
    },

    methods: {

        async fetchUser() {
            this.loading = true;

            try {
                const res = await axios.get(
                    `http://127.0.0.1:8000/api/users/${this.userId}`
                );

                this.form = {
                    name: res.data.name,
                    email: res.data.email,
                    cpf: res.data.cpf,
                    password: ''
                };

            } catch (err) {
                console.error(err);
                this.error = 'Erro ao carregar usuário';
            } finally {
                this.loading = false;
            }
        },

        async fetchProducts() {
            try {
                const res = await axios.get(
                    `http://127.0.0.1:8000/api/produtos/${this.userId}`
                );

                // pode vir objeto ou array dependendo da API
                this.products = Array.isArray(res.data)
                    ? res.data
                    : [res.data];

            } catch (err) {
                console.error(err);
                this.products = [];
            }
        },

        async updateUser() {
            this.error = null;
            this.success = false;

            try {
                await axios.put(
                    `http://127.0.0.1:8000/api/users/${this.userId}`,
                    this.form
                );

                this.success = true;

            } catch (err) {
                console.error(err);
                this.error = 'Erro ao atualizar usuário';
            }
        },

        goBack() {
            window.location.href = "index.html";
        }
    }
};

Vue.createApp(App).mount('#app');
</script>

</body>
</html>
