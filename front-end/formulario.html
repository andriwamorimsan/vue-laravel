<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 40px auto;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

<div id="app">
    <h1>Cadastrar Produto</h1>

    <button @click="goBack">Voltar</button>

    <br><br>

    <input v-model="form.nome" placeholder="Nome do produto" />

    <input v-model="form.preco" type="number" placeholder="Preço" />

    <input v-model="form.user_id" placeholder="ID do usuário" />

    <textarea v-model="form.descricao" placeholder="Descrição"></textarea>

    <button @click="createProduct">Salvar</button>

    <p v-if="error" class="error">{{ error }}</p>
    <p v-if="success" class="success">Produto cadastrado com sucesso!</p>
</div>

<!-- Vue -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<!-- Axios -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const App = {
    data() {
        return {
            form: {
                nome: '',
                preco: '',
                user_id: '',
                descricao: ''
            },
            error: null,
            success: false
        }
    },

    methods: {
        async createProduct() {
            this.error = null;
            this.success = false;

            try {
                await axios.post('http://127.0.0.1:8000/api/produtos', {
                    nome: this.form.nome,
                    preco: parseFloat(this.form.preco),
                    user_id: this.form.user_id,
                    descricao: this.form.descricao
                });

                this.success = true;

                this.form = {
                    nome: '',
                    preco: '',
                    user_id: '',
                    descricao: ''
                };

            } catch (err) {
                console.error(err);
                this.error = 'Erro ao cadastrar produto';
            }
        },

        goBack() {
            window.location.href = "index.html";
        }
    }
};

Vue.createApp(App).mount('#app');
</script>

</body>
</html>
